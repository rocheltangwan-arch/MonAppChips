name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation des dépendances Linux
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev tk-dev libgdbm-dev libdb-dev libpcap-dev xz-utils libexpat1-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33
          
      - name: Fabrication de l'APK
        run: |
          yes | buildozer -v android debug
        env:
          BUILDOZER_ALLOW_KIVY_INSTALL_AS_ROOT: 1

      - name: Téléchargement de l'APK
        uses: actions/upload-artifact@v4
        with:
          name: MonAppChips-APK
          path: bin/*.apk
